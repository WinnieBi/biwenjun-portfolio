<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毕文君 | 产品经理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8F6F3;
      --bg-card: #FFFFFF;
      --text: #2C3E2D;
      --text-secondary: #6B7C6B;
      --accent: #4A6741;
      --sage: #8FAE8B;
      --sage-light: #D4E4D1;
      --cream: #FDF8F3;
      --stone: #E8E4DE;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      min-height: 100vh;
      position: relative;
    }

    /* Organic Background */
    .bg-organic {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
    }

    .blob-1 {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, var(--sage-light), #C8E6C9);
      top: -100px;
      right: -100px;
      animation: drift 20s ease-in-out infinite;
    }

    .blob-2 {
      width: 300px;
      height: 300px;
      background: linear-gradient(135deg, #FFE4D4, #FFECD2);
      bottom: 10%;
      left: -50px;
      animation: drift 25s ease-in-out infinite reverse;
    }

    .blob-3 {
      width: 250px;
      height: 250px;
      background: linear-gradient(135deg, var(--sage-light), #B2DFDB);
      top: 40%;
      right: 10%;
      animation: drift 18s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 140px;
      height: 140px;
      margin: 0 auto 28px;
      position: relative;
    }

    .avatar-circle {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, var(--sage-light), var(--sage));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif SC', serif;
      font-size: 48px;
      font-weight: 600;
      color: var(--accent);
      box-shadow: 
        0 8px 32px rgba(74, 103, 65, 0.15),
        inset 0 2px 8px rgba(255, 255, 255, 0.5);
    }

    .avatar-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid var(--sage);
      border-radius: 50%;
      top: 8px;
      left: 8px;
      opacity: 0.5;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.2; }
    }

    .name {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(2.2rem, 6vw, 3rem);
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }

    .role {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 300;
      letter-spacing: 0.15em;
    }

    .location {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 6px 16px;
      background: var(--bg-card);
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border-radius: 24px;
      padding: 36px;
      margin-bottom: 24px;
      box-shadow: 
        0 4px 24px rgba(74, 103, 65, 0.08),
        0 1px 3px rgba(0, 0, 0, 0.04);
      animation: fadeIn 1s ease backwards;
    }

    .card:nth-child(2) { animation-delay: 0.15s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.45s; }
    .card:nth-child(5) { animation-delay: 0.6s; }

    .card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(to bottom, var(--sage), var(--accent));
      border-radius: 2px;
    }

    /* About */
    .about p {
      font-size: 1.05rem;
      color: var(--text-secondary);
      line-height: 1.9;
    }

    /* Skills */
    .skills-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill-tag {
      padding: 10px 18px;
      background: var(--cream);
      border-radius: 20px;
      font-size: 0.9rem;
      color: var(--accent);
      border: 1px solid var(--stone);
      transition: all 0.3s ease;
    }

    .skill-tag:hover {
      background: var(--sage-light);
      border-color: var(--sage);
      transform: translateY(-2px);
    }

    /* Projects */
    .project-item {
      padding: 24px;
      background: linear-gradient(135deg, var(--cream), var(--bg-card));
      border-radius: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--stone);
      transition: all 0.3s ease;
    }

    .project-item:last-child {
      margin-bottom: 0;
    }

    .project-item:hover {
      border-color: var(--sage);
      box-shadow: 0 4px 20px rgba(74, 103, 65, 0.1);
    }

    .project-name {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .project-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .project-stat {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 12px;
      background: var(--sage-light);
      border-radius: 12px;
      font-size: 0.8rem;
      color: var(--accent);
    }

    /* Contact */
    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: var(--cream);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.95rem;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }

    .contact-item:hover {
      background: var(--sage-light);
      border-color: var(--sage);
    }

    .contact-icon {
      width: 40px;
      height: 40px;
      background: var(--bg-card);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 20px;
      margin-top: 20px;
    }

    .footer-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
    }

    /* Decorative leaf */
    .leaf {
      position: absolute;
      width: 60px;
      height: 60px;
      opacity: 0.15;
    }

    .leaf-1 {
      top: 20%;
      right: 5%;
      transform: rotate(30deg);
    }

    .leaf-2 {
      bottom: 30%;
      left: 3%;
      transform: rotate(-20deg);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 50px 16px;
      }

      .card {
        padding: 24px;
      }

      .avatar {
        width: 110px;
        height: 110px;
      }

      .avatar-circle {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>

    <footer>

  </div>
</body>
</html>
